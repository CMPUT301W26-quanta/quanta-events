name: Build Test Firebase Functions

on:
  pull_request:
    paths:
      - server/**
    
jobs:
  tsc-check:
    name: Build Test Firebase Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Install Upper Dependencies
        run: npm install
        working-directory: ./server

      - name: Install Lower Dependencies
        run: npm install
        working-directory: ./server/functions

      - name: Typecheck TypeScript by Building
        run: npm run build
        working-directory: ./server/functions
